name: Test Optimus

on:
  push:
    branches:
      - "main"

jobs:
  test:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Check Out Main
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive TZ=Etc/UTC apt-get install tzdata -y
          apt-get install gzip wget cpanminus make gcc libpcap-dev net-tools curl tcpdump -y
          apt-get install libjson-perl libnet-pcap-perl libdata-dmp-perl libsys-hostname-long-perl libgetopt-long-descriptive-perl libuuid-tiny-perl libmaxmind-db-reader-perl libnet-ipaddress-perl libnetpacket-perl libuuid-tiny-perl libmaxmind-db-reader-perl php
          cpanm -f -n Search::Elasticsearch

      - name: Test Optimus
        run: |
          cd optimus
          perl -wc bin/optimus.pl
