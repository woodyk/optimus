[application]
#####################################
# Running config options        
#####################################
useTags		= 1				; Process tag rules.
dataSource	= live				; Source name label. eg: work, router1, etc... 

#####################################
# JSON output options        
#####################################
displayJson	= 0				; Enable JSON output

#####################################
# STDOUT options
#####################################
debug		= 0				; Enable debug output
logging		= 1				; Enable logging

#####################################
# ElasticSearch options 
#####################################
elastic		= 0				; use elasticsearch
esPrefix	= packets_			; elasticsearch index prefix
esNode		= 192.168.4.12:9200		; elasticsearch host, and port for injection

#####################################
# Packet Capture options 
#####################################
interface	= eth1				; Set the interface to listen to and profile.
l2Enable	= 1				; Enable layer 2 data collection 0=off 1=on.
l7Enable	= 1				; Enable layer 7 collection details 0=off 1=on.
ip6Enable	= 1				; Enable IPv6 collection details 0=off 1=on.
hwVendor	= 1				; Collect the vendor for all MAC addresses found.
payload		= 1				; Collect payload sample on or off.
plBits		= 1024				; Number of bits of payload to capture.
sample		= 5000				; Packet samples to process. 0=unlimited packets
maxPerDest	= 0				; Max packtes per destination IP to record;
ouiFile		= ../lib/wireshark_oui.txt	; Path for writing wireshark_oui.txt
ouiUrl		= https://gitlab.com/wireshark/wireshark/-/raw/master/manuf	; URL for obtaining wireshark OUIs
geoIp		= 0				; Enable Geo IP records. Do not enable with elasticsearch.
geoIpDb		= ../lib/GeoLite2-City.mmdb	; Path to your GeoIp database. 
nameLookup	= 0				; Enable reverse DNS lookups.
